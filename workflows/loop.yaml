description: 检查点驱动的循环执行：先把需求拆解为检查点清单，再循环执行直到全部通过

manual_step:

adversarial_check:
  # model: anthropic/claude-sonnet-4-5  # 可选：验证模型（"provider/model" 或 {providerID, modelID}）；不填则用 ralph-check agent 默认模型
  timeout_ms: 3600000  # 60 分钟（上限）

steps:
  - id: checkpoints
    desc: 拆解用户需求为检查点清单
    do: |
      仔细分析用户需求，产出检查点清单。只做分析和拆解，**不要开始实现任务本身**。

      输出 `checkpoints.md`：
      1. 逐句阅读用户需求，把每个要求拆成独立的检查点，绝对细致，不遗漏任何要点
      2. 补充隐含要求的检查点（如：构建通过、现有测试不回归、无残留 TODO/调试代码）
      3. 每个检查点必须是可独立验证的客观事实（如"函数 X 对输入 Y 返回 Z"、"文件 W 存在且包含 V"），
         禁止模糊表述（如"代码质量好"、"功能正常"）
      4. 每个检查点标注**验证方式**：跑哪条命令、看哪个文件、运行哪个测试
      5. 格式：`- [ ] CP-<编号>: <检查点描述> ｜ 验证方式: <具体命令或方法>`
    input: 用户输入的任务描述
    output: "checkpoints.md"
    check: |
      对照用户需求逐句核对 checkpoints.md：
      1. 用户需求中每一个明确要求都有对应检查点，无遗漏
      2. 隐含要求已覆盖（构建通过、测试不回归等）
      3. 每个检查点是可验证的客观事实，无模糊表述
      4. 每个检查点都标注了具体可执行的验证方式
      任何一条不满足即不通过，并指出缺失或含糊的具体条目。
    on_pass: loop
    on_fail: checkpoints
    max_fail_count: 5

  - id: loop
    desc: 循环执行任务直到所有检查点通过
    do: |
      按 `checkpoints.md` 执行任务。

      你需要：
      1. 逐项完成检查点，每完成一项按其标注的验证方式自验，
         然后把 `- [ ]` 改为 `- [x]` 并在该行追加验证证据（命令输出摘要或文件位置）
      2. 实现过程中发现清单遗漏的要求，先在 checkpoints.md 中追加新检查点，再实现它
      3. 遇到问题主动解决，不要跳过或放弃
    input: "checkpoints.md + 用户任务描述"
    output: 所有检查点完成的实现 + 全部打勾的 checkpoints.md
    check: |
      你是一个挑剔的测试工程师：你的目标不是确认任务完成，而是想办法证明它没完成。

      第一步：逐条验证检查点
      - 对每个检查点，执行其标注的验证方式，亲自确认事实成立
      - 不要相信打勾状态和记录的证据，必须自己重新验证
      - 存在未打勾的检查点直接不通过

      第二步：抽查清单完整性
      - 对照用户需求快速核对 checkpoints.md 是否有遗漏的要求
      - 发现遗漏即不通过，并指出遗漏的具体要求

      第三步：挑剔地审查本轮变更
      - 用 git diff 查看本次变更涉及的文件，以挑剔测试工程师的视角自由发挥，
        设法找出能让它出问题的场景
      - 只审查变更涉及的文件，不要扩大到整个项目

      通过条件：所有检查点验证通过 + 清单无遗漏 + 挑剔审查未发现实在的问题。
      不通过条件：任一检查点失败、清单有遗漏、或发现实在的 bug（说明触发场景）。
    on_pass: done
    on_fail: loop
    max_fail_count: 100
